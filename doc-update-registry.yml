# doc-update-registry.yml
#
# Maps source paths to docs that MUST be reviewed (and potentially updated)
# when those paths change in a PR.
#
# Used by: PR reviewers, AI PR review agent.
#
# Rules:
#   - Every PR touching files under a "source" glob must verify the linked docs
#     are still accurate. Update them if needed, or confirm no change required.
#   - Plan docs (docs/plans/) are excluded — they are ticket-scoped.
#
# Format:
#   - source: <glob pattern>
#     docs:
#       - <path to doc that may need updating>
#     reason: <why this mapping exists>

# --- Python application ---
- source: "src/xflats/**/*.py"
  docs:
    - README.md
  reason: "App logic changes may affect setup/usage docs"

- source: "pyproject.toml"
  docs:
    - README.md
  reason: "Dependency/tool config changes affect setup instructions"

- source: "docker/Dockerfile"
  docs:
    - README.md
    - AGENTS.md
  reason: "Container changes affect build commands and agent tech stack reference"

# --- Infrastructure ---
- source: "infra/**/*.tf"
  docs:
    - README.md
    - AGENTS.md
  reason: "Terraform changes affect infra docs and agent permissions/commands"

# --- Agent config ---
- source: ".agents/**"
  docs:
    - AGENTS.md
  reason: "Skill changes affect agent behavior documentation"

- source: "opencode.json"
  docs:
    - AGENTS.md
  reason: "Permission/MCP changes affect agent capabilities"

# --- Testing ---
- source: "tests/**"
  docs:
    - README.md
  reason: "Test changes affect testing instructions and coverage info"

# --- Tooling ---
- source: "justfile"
  docs:
    - README.md
    - AGENTS.md
  reason: "Task runner changes affect dev workflow commands"

- source: ".pre-commit-config.yaml"
  docs:
    - README.md
  reason: "Pre-commit hook changes affect contributor setup"

# --- CI/CD ---
- source: ".github/workflows/**"
  docs:
    - README.md
  reason: "CI/CD pipeline changes affect deployment and PR check docs"

# --- Git config ---
- source: ".gitignore"
  docs: []
  reason: "Gitignore changes rarely need doc updates"
